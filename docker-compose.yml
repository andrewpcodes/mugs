services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: mugsdb
      POSTGRES_USER: mugs
      POSTGRES_PASSWORD: mugs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mugs -d mugsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mugsdb
      SPRING_DATASOURCE_USERNAME: mugs
      SPRING_DATASOURCE_PASSWORD: mugs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
